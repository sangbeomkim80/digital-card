<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="효성 명함 생성기">
<title>효성티앤씨 QR코드 명함 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2e78;
    --navy-dark: #111d52;
    --gold: #b8963e;
    --gold-light: #d4b06a;
    --bg: #f5f4f0;
    --text-dark: #222;
    --text-mid: #555;
    --text-light: #888;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg); color: var(--text-dark);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 900; font-style: italic; letter-spacing: 0.04em;
  }
  .header .logo { font-size: 18px; color: #fff; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: all 0.3s;
  }
  .status-dot.active { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }

  /* ── Tabs ── */
  .tabs {
    display: flex; background: #fff;
    border-bottom: 1px solid #e8e8e8;
    position: sticky; top: 48px; z-index: 49;
  }
  .tab {
    flex: 1; padding: 12px 0; text-align: center;
    font-size: 13px; font-weight: 600; color: var(--text-light);
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit; transition: all 0.2s;
  }
  .tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* ── Tab Panels ── */
  .panel { display: none; padding: 20px; }
  .panel.active { display: block; }

  /* ── Form ── */
  .form-actions {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .btn-sample, .btn-reset {
    flex: 1; padding: 10px 0; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; border: none;
  }
  .btn-sample { background: var(--navy); color: #fff; }
  .btn-reset { background: #fff; border: 1px solid #ddd; color: var(--text-light); }

  .field-group { margin-bottom: 16px; }
  .field-group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; cursor: pointer; user-select: none;
  }
  .field-group-title {
    font-size: 12px; font-weight: 700; color: var(--navy);
    letter-spacing: 0.04em;
  }
  .field-group-toggle {
    font-size: 16px; color: var(--text-light);
    transition: transform 0.2s;
  }
  .field-group-toggle.collapsed { transform: rotate(-90deg); }
  .field-group-divider {
    height: 2px; background: var(--gold); margin-bottom: 12px;
  }
  .field-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s;
  }
  .field-grid.collapsed { max-height: 0; opacity: 0; margin: 0; }
  .field-full { grid-column: 1 / -1; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--text-light); margin-bottom: 4px;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 15px; outline: none; background: #fff;
    font-family: inherit; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(26,46,120,0.08); }
  .req { color: #e53e3e; font-weight: 700; }
  .required-field.empty { border-left: 3px solid #e53e3e; }
  .required-field.filled { border-left: 3px solid #4ade80; }

  /* ── QR Panel ── */
  .qr-container {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 0;
  }
  .qr-card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    padding: 28px; width: 100%; max-width: 340;
    display: flex; flex-direction: column; align-items: center;
  }
  .qr-card img {
    display: block; border-radius: 4px;
    transition: opacity 0.3s;
  }
  .qr-name {
    margin-top: 16px; font-size: 16px; font-weight: 700;
    color: var(--text-dark); text-align: center;
  }
  .qr-meta {
    font-size: 12px; color: var(--text-light);
    text-align: center; margin-top: 4px;
  }
  .qr-hint {
    margin-top: 20px; font-size: 12px; color: var(--text-light);
    text-align: center; line-height: 1.6;
    padding: 12px 16px; background: rgba(26,46,120,0.04);
    border-radius: 8px; width: 100%; max-width: 340px;
  }
  .qr-empty-state {
    text-align: center; padding: 60px 20px;
  }
  .qr-empty-state .icon { font-size: 56px; opacity: 0.2; margin-bottom: 12px; }
  .qr-empty-state p { font-size: 14px; color: #aaa; line-height: 1.6; }

  /* ── Preview Panel ── */
  .preview-lang-toggle {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .lang-btn {
    flex: 1; padding: 10px 0; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    border: 2px solid #ddd; background: #fff; color: var(--text-light);
  }
  .lang-btn.active { border-color: var(--navy); background: var(--navy); color: #fff; }

  .card-replica {
    width: 100%; max-width: 480px; margin: 0 auto;
    aspect-ratio: 9 / 5.4;
    background: #fff; border-radius: 6px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card-border-left {
    display: none;
  }
  .card-border-bottom {
    display: none;
  }
  .card-logo-area { padding: 20px 28px 0; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
  .card-logo-area .logo { font-size: 24px; color: var(--navy); }
  .card-content {
    display: grid; grid-template-columns: 2fr 3fr;
    padding: 0 20px 18px; align-items: start; gap: 8px;
  }
  .card-name {
    font-size: 15px; font-weight: 800; color: var(--text-dark); line-height: 1.3;
    white-space: nowrap;
  }
  .card-name.kr { letter-spacing: 0.55em; }
  .card-name.en { letter-spacing: 0.03em; font-size: 13px; }
  .card-dept { margin-top: 6px; font-size: 9px; color: #777; line-height: 1.5; }
  .card-company { margin-bottom: 4px; font-size: 11px; font-weight: 800; color: var(--text-dark); white-space: nowrap; }
  .card-info-line { font-size: 8.5px; color: #999; line-height: 1.7; white-space: nowrap; }

  .preview-empty {
    text-align: center; padding: 60px 20px;
  }
  .preview-empty .icon { font-size: 48px; opacity: 0.2; margin-bottom: 12px; }
  .preview-empty p { font-size: 14px; color: #aaa; }

  /* ── Bottom Action Bar ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #e8e8e8;
    padding: 12px 20px;
    padding-bottom: calc(12px + var(--safe-bottom));
    display: flex; gap: 10px;
    z-index: 60;
  }
  .btn-action {
    flex: 1; padding: 14px 0; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; border: none; transition: all 0.2s;
  }
  .btn-action:active { transform: scale(0.97); }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-action:disabled { background: #ddd; color: #aaa; cursor: default; }
  .btn-action:disabled:active { transform: none; }

  /* ── Desktop ── */
  @media (min-width: 768px) {
    .panel { max-width: 600px; margin: 0 auto; }
    .card-replica { max-width: 540px; }
    .card-logo-area img { height: 104px; }
    .card-name { font-size: 22px; }
    .card-name.en { font-size: 19px; }
    .card-company { font-size: 16px; }
    .card-info-line { font-size: 10.5px; }
    .card-dept { font-size: 11.5px; }
    .card-content { padding: 0 36px 28px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span style="font-family:'Noto Sans KR',sans-serif;font-weight:800;color:#fff;font-size:16px;">효성티앤씨 QR코드 명함 생성기</span>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tabEdit">입력</button>
  <button class="tab" id="tabQr">QR코드</button>
  <button class="tab" id="tabPreview">미리보기</button>
</div>

<!-- ===== EDIT PANEL ===== -->
<div class="panel active" id="panel-edit">
  <div class="form-actions">
    <button class="btn-sample" id="btnSample">예시 보기</button>
    <button class="btn-reset" id="btnReset">초기화</button>
  </div>

  <div class="field-group">
    <div class="field-group-header" >
      <span class="field-group-title">이름</span>
      <span class="field-group-toggle">▾</span>
    </div>
    <div class="field-group-divider"></div>
    <div class="field-grid">
      <div class="field"><label>성 (한) <span class="req">*</span></label><input id="lastName" placeholder="홍" inputmode="text" class="required-field"></div>
      <div class="field"><label>이름 (한) <span class="req">*</span></label><input id="firstName" placeholder="길동" inputmode="text" class="required-field"></div>
      <div class="field"><label>성 (영)</label><input id="lastNameEn" placeholder="HONG" inputmode="text"></div>
      <div class="field"><label>이름 (영)</label><input id="firstNameEn" placeholder="GIL DONG" inputmode="text"></div>
    </div>
  </div>

  <div class="field-group">
    <div class="field-group-header" >
      <span class="field-group-title">소속</span>
      <span class="field-group-toggle">▾</span>
    </div>
    <div class="field-group-divider"></div>
    <div class="field-grid">
      <div class="field"><label>직책</label><input id="position" placeholder="팀장 등"></div>
      <div class="field"></div>
      <div class="field"><label>직함 (한)</label><input id="titleKr" placeholder="Performance Manager"></div>
      <div class="field"><label>직함 (영)</label><input id="titleEn" placeholder="Performance Manager"></div>
      <div class="field"><label>부서 (한)</label><input id="dept" placeholder="ESG경영팀"></div>
      <div class="field"><label>부서 (영)</label><input id="deptEn" placeholder="ESG Management Team"></div>
    </div>
  </div>

  <div class="field-group">
    <div class="field-group-header" >
      <span class="field-group-title">연락처</span>
      <span class="field-group-toggle">▾</span>
    </div>
    <div class="field-group-divider"></div>
    <div class="field-grid">
      <div class="field"><label>Tel</label><input id="tel" placeholder="02-707-7583" inputmode="tel"></div>
      <div class="field"><label>Mobile <span class="req">*</span></label><input id="mobile" placeholder="010-1111-2222" inputmode="tel" class="required-field"></div>
      <div class="field field-full"><label>E-mail <span class="req">*</span></label><input id="email" placeholder="gildong.hong@hyosung.com" inputmode="email" class="required-field"></div>
      <div class="field field-full"><label>Website</label><input id="website" placeholder="www.hyosungtnc.com" value="www.hyosungtnc.com" inputmode="url"></div>
    </div>
  </div>

  <div class="field-group">
    <div class="field-group-header" >
      <span class="field-group-title">주소</span>
      <span class="field-group-toggle">▾</span>
    </div>
    <div class="field-group-divider"></div>
    <div class="field-grid">
      <div class="field field-full"><label>주소 (한)</label><input id="addressKr" placeholder="04144 서울특별시 마포구 마포대로 119 (공덕동)"></div>
      <div class="field field-full"><label>주소 (영)</label><input id="addressEn" placeholder="119, Mapo-daero, Mapo-gu, Seoul, Korea 04144"></div>
    </div>
  </div>


</div>

<!-- ===== QR PANEL ===== -->
<div class="panel" id="panel-qr">
  <div class="qr-container" id="qrContainer">
    <div class="qr-empty-state">
      <div class="icon">📇</div>
      <p>입력 탭에서 명함 정보를 먼저 입력해 주세요.</p>
    </div>
  </div>
</div>

<!-- ===== PREVIEW PANEL ===== -->
<div class="panel" id="panel-preview">
  <div id="previewContent">
    <div class="preview-lang-toggle">
      <button class="lang-btn active" id="langKr">국문</button>
      <button class="lang-btn" id="langEn">영문</button>
    </div>

<script>
const QR_API = "https://api.qrserver.com/v1/create-qr-code/";
const FIELDS = ["lastName","firstName","lastNameEn","firstNameEn","position","titleKr","titleEn","dept","deptEn","tel","mobile","email","website","addressKr","addressEn"];
let currentLang = "kr";
let currentTab = "edit";

const SAMPLE = {
  lastName:"홍", firstName:"길동", lastNameEn:"HONG", firstNameEn:"GIL DONG",
  position:"팀장", titleKr:"Performance Manager", titleEn:"Performance Manager", dept:"ESG경영팀", deptEn:"ESG Management Team",
  tel:"02-707-7583", mobile:"010-1111-2222",
  email:"gildong.hong@hyosung.com", website:"www.hyosungtnc.com",
  addressKr:"04144 서울특별시 마포구 마포대로 119 (공덕동)",
  addressEn:"119, Mapo-daero, Mapo-gu, Seoul, Korea 04144",
};

function getForm() {
  const d = {};
  FIELDS.forEach(k => d[k] = document.getElementById(k).value.trim());
  d.companyKr = "효성티앤씨(주)";
  d.companyEn = "HYOSUNG TNC CORPORATION";
  return d;
}

function isValid() {
  const d = getForm();
  return !!(d.firstName && d.lastName && (d.mobile || d.email));
}

function generateVCard(d) {
  if (!d) d = getForm();
  return [
    "BEGIN:VCARD","VERSION:3.0",
    "N:"+d.lastName+";"+d.firstName+";;;",
    "FN:"+d.firstName+" "+d.lastName,
    "ORG:"+d.companyKr,
    "TITLE:"+d.titleKr,
    d.dept?"X-DEPARTMENT:"+d.dept:"",
    d.tel?"TEL;TYPE=WORK:"+d.tel:"",
    d.mobile?"TEL;TYPE=CELL:"+d.mobile:"",
    d.email?"EMAIL:"+d.email:"",
    d.website?"URL:https://"+d.website:"",
    d.addressKr?"ADR;TYPE=WORK:;;"+d.addressKr+";;;;":"",
    "END:VCARD"
  ].filter(Boolean).join("\n");
}

function downloadVCard() {
  const d = getForm();
  const blob = new Blob([generateVCard(d)], {type:"text/vcard;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (d.lastNameEn||d.lastName)+"_"+(d.firstNameEn||d.firstName)+".vcf";
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Tabs ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["edit","qr","preview"][i] === tab);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-"+tab).classList.add("active");

  if (tab === "qr") updateQR();
  if (tab === "preview") updatePreview();
}

/* ── Collapsible groups ── */
function toggleGroup(header) {
  const grid = header.parentElement.querySelector(".field-grid");
  const toggle = header.querySelector(".field-group-toggle");
  grid.classList.toggle("collapsed");
  toggle.classList.toggle("collapsed");
}

/* ── QR update ── */
function updateQR() {
  const container = document.getElementById("qrContainer");
  const valid = isValid();

  if (!valid) {
    container.innerHTML = '<div class="qr-empty-state"><div class="icon">📇</div><p>입력 탭에서 명함 정보를<br>먼저 입력해 주세요.</p></div>';
    return;
  }

  const d = getForm();
  const qrUrl = QR_API+"?size=400x400&data="+encodeURIComponent(generateVCard(d))+"&color=1a2e78&bgcolor=ffffff&format=svg";

  container.innerHTML =
    '<div class="qr-card">' +
      '<img src="'+qrUrl+'" width="220" height="220" alt="QR">' +
      '<p class="qr-name">'+d.lastName+d.firstName+'</p>' +
      '<p class="qr-meta">'+(d.dept||"")+(d.dept&&d.titleKr?" · ":"")+d.titleKr+'</p>' +
    '</div>' +
    '<div class="qr-hint">스마트폰 카메라로 QR코드를 스캔하면<br>연락처가 바로 저장됩니다.</div>' +
    '<button id="btnQrVcard" style="margin-top:16px;padding:10px 20px;background:none;border:1px solid #ccc;border-radius:8px;font-size:12px;color:#888;cursor:pointer;font-family:inherit;">vCard 파일 직접 다운로드</button>';
  document.getElementById("btnQrVcard").addEventListener("click", downloadVCard);
}

/* ── Preview update ── */
function updatePreview() {
  const valid = isValid();
  document.getElementById("previewContent").style.display = valid ? "block" : "none";
  document.getElementById("previewEmpty").style.display = valid ? "none" : "block";
  if (!valid) return;

  const d = getForm();
  const kr = currentLang === "kr";
  const nameEl = document.getElementById("cardName");
  if (kr) {
    nameEl.textContent = d.lastName+d.firstName;
  } else {
    nameEl.textContent = d.firstNameEn+" "+d.lastNameEn;
  }
  nameEl.className = "card-name "+(kr?"kr":"en");

  var deptLine = kr ? (d.dept||"") : (d.deptEn||"");
  if (kr && d.position && deptLine) deptLine += " ("+d.position+")";
  var titleLine = kr ? (d.titleKr||"") : (d.titleEn||"");
  var deptHtml = kr ? (deptLine+"<br>"+titleLine) : (titleLine+"<br>"+deptLine);
  deptHtml = deptHtml.replace(/^<br>|<br>$/g,"");
  document.getElementById("cardDept").innerHTML = deptHtml;
  document.getElementById("cardCompany").textContent = kr?d.companyKr:d.companyEn;

  const lines = [
    kr?d.addressKr:d.addressEn,
    d.tel?"Tel : "+(kr?d.tel:"82-"+d.tel.replace(/^0/,"")):"",
    d.mobile?"Mobile : "+(kr?d.mobile:"82-"+d.mobile.replace(/^0/,"")):"",
    d.email?"E-mail : "+d.email:"",
    d.website
  ].filter(Boolean);

  document.getElementById("cardInfo").innerHTML =
    lines.map(l => '<p class="card-info-line">'+l+'</p>').join("");
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById("langKr").classList.toggle("active", lang==="kr");
  document.getElementById("langEn").classList.toggle("active", lang==="en");
  updatePreview();
}

/* ── LocalStorage ── */
const STORAGE_KEY = "hyosung_card_data";

function saveForm() {
  try {
    const d = {};
    FIELDS.forEach(k => d[k] = document.getElementById(k).value);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  } catch(e) {}
}

function loadSavedForm() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    let loaded = false;
    FIELDS.forEach(k => {
      if (d[k] !== undefined && d[k] !== "") {
        document.getElementById(k).value = d[k];
        loaded = true;
      }
    });
    return loaded;
  } catch(e) { return false; }
}

/* ── Global state update ── */
function updateAll() {
  var valid = isValid();
  document.getElementById("statusDot").className = "status-dot"+(valid?" active":"");
  if (currentTab === "qr") updateQR();
  if (currentTab === "preview") updatePreview();
  // Update required field borders
  var reqFields = document.querySelectorAll(".required-field");
  for (var i = 0; i < reqFields.length; i++) {
    var f = reqFields[i];
    if (f.value.trim()) {
      f.classList.remove("empty");
      f.classList.add("filled");
    } else {
      f.classList.remove("filled");
      f.classList.add("empty");
    }
  }
}

function loadSample() {
  FIELDS.forEach(k => { if(SAMPLE[k]) document.getElementById(k).value = SAMPLE[k]; });
  saveForm();
  updateAll();
}

function resetForm() {
  if (!confirm("입력한 명함 정보가 모두 삭제됩니다. 초기화하시겠습니까?")) return;
  FIELDS.forEach(k => {
    document.getElementById(k).value = (k==="website")?"www.hyosungtnc.com":"";
  });
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  updateAll();
}

/* ── Phone auto-format ── */
function formatPhone(val) {
  var n = val.replace(/[^0-9]/g, "");
  if (n.length === 0) return "";
  // 02-XXXX-XXXX (서울)
  if (n.substring(0,2) === "02") {
    if (n.length <= 2) return n;
    if (n.length <= 5) return n.substring(0,2)+"-"+n.substring(2);
    if (n.length <= 9) return n.substring(0,2)+"-"+n.substring(2,5)+"-"+n.substring(5);
    return n.substring(0,2)+"-"+n.substring(2,6)+"-"+n.substring(6,10);
  }
  // 010-XXXX-XXXX, 0XX-XXXX-XXXX
  if (n.length <= 3) return n;
  if (n.length <= 7) return n.substring(0,3)+"-"+n.substring(3);
  return n.substring(0,3)+"-"+n.substring(3,7)+"-"+n.substring(7,11);
}

document.addEventListener("input", function(e) {
  if (e.target.tagName === "INPUT") {
    if (e.target.id === "tel" || e.target.id === "mobile") {
      var pos = e.target.selectionStart;
      var oldLen = e.target.value.length;
      e.target.value = formatPhone(e.target.value);
      var newLen = e.target.value.length;
      var newPos = pos + (newLen - oldLen);
      e.target.setSelectionRange(newPos, newPos);
    }
    saveForm(); updateAll();
  }
});

// ── Event bindings (no inline onclick) ──
document.getElementById("tabEdit").addEventListener("click", function(){ switchTab("edit"); });
document.getElementById("tabQr").addEventListener("click", function(){ switchTab("qr"); });
document.getElementById("tabPreview").addEventListener("click", function(){ switchTab("preview"); });
document.getElementById("btnSample").addEventListener("click", loadSample);
document.getElementById("btnReset").addEventListener("click", resetForm);
document.getElementById("langKr").addEventListener("click", function(){ setLang("kr"); });
document.getElementById("langEn").addEventListener("click", function(){ setLang("en"); });

// Collapsible field groups (event delegation)
document.querySelectorAll(".field-group-header").forEach(function(header) {
  header.addEventListener("click", function() { toggleGroup(header); });
});

// Init: restore saved data, then update UI
const hadSaved = loadSavedForm();
updateAll();
if (hadSaved && isValid()) switchTab("qr");
</script>
